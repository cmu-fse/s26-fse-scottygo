<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Service Demo</title>
    <style>
      * {
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
      }
      h1 {
        color: #333;
        margin-top: 0;
        text-align: center;
      }
      .subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #444;
        font-weight: 500;
      }
      input[type='email'] {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.2s;
      }
      input[type='email']:focus {
        outline: none;
        border-color: #667eea;
      }
      select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        background: white;
        cursor: pointer;
      }
      select:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      button:active {
        transform: translateY(0);
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .status {
        margin-top: 20px;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
        display: none;
      }
      .status.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
      .status.loading {
        background: #e2e3e5;
        color: #383d41;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📧 Email Service Demo</h1>
      <p class="subtitle">Test ScottyGO email notifications</p>

      <form id="emailForm">
        <div class="form-group">
          <label for="email">Recipient Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter email address..."
            required
          />
        </div>

        <div class="form-group">
          <label for="emailType">Email Type</label>
          <select id="emailType" name="emailType">
            <option value="inactivated">Account Inactivated</option>
            <option value="reactivated">Account Reactivated</option>
          </select>
        </div>

        <div class="form-group">
          <label for="username">Username (for email)</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="TestUser"
            value="TestUser"
            style="
              width: 100%;
              padding: 12px 16px;
              border: 2px solid #ddd;
              border-radius: 8px;
              font-size: 16px;
            "
          />
        </div>

        <button type="submit" id="sendBtn">Send Email</button>
      </form>

      <div id="status" class="status"></div>
    </div>

    <script>
      const form = document.getElementById('emailForm');
      const statusDiv = document.getElementById('status');
      const sendBtn = document.getElementById('sendBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const emailType = document.getElementById('emailType').value;
        const username =
          document.getElementById('username').value || 'TestUser';

        // Show loading state
        statusDiv.className = 'status loading';
        statusDiv.textContent = 'Sending email...';
        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';

        try {
          const response = await fetch('/api/send-email', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, emailType, username })
          });

          const data = await response.json();

          if (response.ok && data.success) {
            statusDiv.className = 'status success';
            statusDiv.textContent = `✅ Email sent successfully to ${email}!`;
          } else {
            statusDiv.className = 'status error';
            statusDiv.textContent = `❌ Failed: ${data.message || 'Unknown error'}`;
          }
        } catch (error) {
          statusDiv.className = 'status error';
          statusDiv.textContent = `❌ Error: ${error.message}`;
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Email';
        }
      });
    </script>
  </body>
</html>
