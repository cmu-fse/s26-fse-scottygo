<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScottyGo - Account</title>
    <link rel="stylesheet" href="../styles/account.css" />
  </head>
  <body>
    <header class="app-header">
      <a href="/map" class="back-icon" id="back-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z"
            fill="white"
          />
        </svg>
      </a>
      <div class="menu-icon" id="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav class="dropdown-menu" id="dropdown-menu">
        <div class="dropdown-header">
          <h2>ScottyGo</h2>
        </div>
        <div class="dropdown-grid">
          <a href="#" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </div>
            <span>Saved</span>
          </a>
          <a href="#" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </div>
            <span>Notifications</span>
          </a>
          <a href="/account" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <span>Manage Account</span>
          </a>
          <a href="#" class="dropdown-item" id="menu-logout-btn">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </div>
            <span>Log out</span>
          </a>
        </div>
      </nav>
    </header>
    <main class="content">
      <!-- Page title: "Account" for Member, "Manage Accounts" for Admin -->
      <h1 class="page-title" id="page-title">Account</h1>

      <!-- Username selector (Admin only) -->
      <div class="form-group" id="user-selector-group" hidden>
        <label for="user-selector">Select Username</label>
        <select id="user-selector" class="form-input">
          <option value="">Select Username</option>
        </select>
        <p
          id="search-status"
          class="field-error"
          role="status"
          aria-live="polite"
        ></p>
      </div>

      <!-- Account Status toggle (Member only, outside card per wireframe) -->
      <div class="status-toggle-group" id="status-toggle-group" hidden>
        <div class="toggle-row">
          <span class="toggle-label">Account Status</span>
          <label class="toggle-switch">
            <input type="checkbox" id="status-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <span class="toggle-status-text" id="toggle-status-text">Active</span>
      </div>

      <!-- Single unified account card -->
      <div class="account-card" id="account-card" hidden>
        <form id="account-form" novalidate>
          <!-- Account Status (read-only display) -->
          <div class="form-group" id="status-display-group">
            <label>Account Status</label>
            <span class="field-value" id="display-status">—</span>
          </div>

          <!-- Username -->
          <div class="form-group" id="username-group">
            <label for="field-username">Username</label>
            <span class="field-value" id="display-username">—</span>
            <input
              type="text"
              id="field-username"
              name="username"
              class="form-input"
              hidden
            />
            <p class="field-error" id="username-error"></p>
          </div>

          <!-- Email -->
          <div class="form-group" id="email-group">
            <label for="field-email">Email</label>
            <span class="field-value" id="display-email">—</span>
            <input
              type="email"
              id="field-email"
              name="email"
              class="form-input"
              hidden
            />
            <p class="field-error" id="email-error"></p>
          </div>

          <!-- Password -->
          <div class="form-group" id="password-group">
            <label for="field-password">Password</label>
            <span class="field-value" id="display-password">••••••••</span>
            <input
              type="password"
              id="field-password"
              name="password"
              class="form-input"
              hidden
              placeholder="Enter new password"
            />
            <p class="field-error" id="password-error"></p>
          </div>

          <!-- Privilege Level (Admin only) -->
          <div class="form-group" id="privilege-group" hidden>
            <label for="field-privilege">Privilege Level</label>
            <span class="field-value" id="display-privilege">—</span>
            <select
              id="field-privilege"
              name="privilege"
              class="form-input"
              hidden
            >
              <option value="Member">Member</option>
              <option value="Coordinator">Coordinator</option>
              <option value="Administrator">Administrator</option>
            </select>
            <p class="field-error" id="privilege-error"></p>
          </div>

          <!-- Account Status (editable, Admin only for others; self-inactivation for Member) -->
          <div class="form-group" id="status-edit-group" hidden>
            <label for="field-status">Account Status</label>
            <select id="field-status" name="status" class="form-input" hidden>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
            <p class="field-error" id="status-error"></p>
          </div>

          <!-- Action buttons -->
          <div class="form-actions">
            <button type="button" class="submit-btn" id="edit-btn">Edit</button>
            <button type="submit" class="submit-btn" id="save-btn" hidden
              >Save Changes</button
            >
            <button type="button" class="cancel-btn" id="cancel-btn" hidden
              >Cancel</button
            >
          </div>

          <!-- Success / global status message -->
          <p
            id="form-status"
            class="form-status"
            role="status"
            aria-live="polite"
          ></p>
        </form>
      </div>
    </main>

    <!-- Confirm inactivation modal -->
    <div id="confirm-modal" class="modal-backdrop" inert>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirm-title"
      >
        <p id="confirm-message" class="modal-message"></p>
        <div class="modal-actions">
          <button
            type="button"
            class="modal-btn modal-btn--primary"
            id="confirm-yes"
            >Confirm</button
          >
          <button
            type="button"
            class="modal-btn modal-btn--secondary"
            id="confirm-no"
            >Cancel</button
          >
        </div>
      </div>
    </div>

    <script type="module" src="../scripts/account.ts"></script>
  </body>
</html>
