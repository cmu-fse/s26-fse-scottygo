<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScottyGo - Route Map</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/map.css" />
  </head>
  <body>
    <header class="app-header">
      <a href="/home" class="back-icon" id="back-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z"
            fill="white"
          />
        </svg>
      </a>
      <div class="menu-icon" id="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <nav class="dropdown-menu" id="dropdown-menu">
        <div class="dropdown-header">
          <h2>ScottyGo</h2>
        </div>
        <div class="dropdown-grid">
          <a href="#" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </div>
            <span>Saved</span>
          </a>
          <a href="#" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </div>
            <span>Notifications</span>
          </a>
          <a href="/account" class="dropdown-item">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <span>Manage Account</span>
          </a>
          <a href="#" class="dropdown-item" id="menu-logout-btn">
            <div class="icon-circle">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </div>
            <span>Log out</span>
          </a>
        </div>
      </nav>
    </header>
    <main class="content">
      <div class="map-container">
        <div id="map"></div>
        <div id="service-status-banner" class="service-status-banner" hidden></div>
        <transit-search></transit-search>
        <location-indicator></location-indicator>
        <map-controls></map-controls>
        <zoom-controls></zoom-controls>
        <div id="detour-banner" class="detour-banner" hidden></div>
        <toggle-panel id="direction-panel"></toggle-panel>
        <toggle-panel id="system-panel"></toggle-panel>
        <time-picker-panel></time-picker-panel>
        <calendar-picker-panel></calendar-picker-panel>
        <route-selector-panel></route-selector-panel>
      </div>
    </main>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-backdrop" inert>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-message" class="modal-message"></p>
        <div class="modal-actions">
          <button
            type="button"
            class="modal-btn modal-btn--primary"
            id="modal-ok"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="../scripts/map.ts"></script>
  </body>
</html>
