<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ScottyGo - Route Map</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/map.css" />
  </head>
  <body>
    <app-header back></app-header>
    <main class="content">
      <div class="map-container">
        <div id="map"></div>
        <div
          id="service-status-banner"
          class="service-status-banner"
          hidden
        ></div>
        <transit-search></transit-search>
        <location-indicator></location-indicator>
        <map-controls></map-controls>
        <route-bell></route-bell>
        <zoom-controls></zoom-controls>
        <toggle-panel id="direction-panel"></toggle-panel>
        <toggle-panel id="system-panel"></toggle-panel>
        <time-picker-panel></time-picker-panel>
        <calendar-picker-panel></calendar-picker-panel>
        <route-selector-panel></route-selector-panel>
        <div id="map-notif-container" class="map-notif-container"></div>
      </div>
    </main>
    <bus-report-form></bus-report-form>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-backdrop" inert>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-message" class="modal-message"></p>
        <div class="modal-actions">
          <button
            type="button"
            class="modal-btn modal-btn--primary"
            id="modal-ok"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="../scripts/map.ts"></script>
  </body>
</html>
