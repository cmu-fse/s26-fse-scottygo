<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScottyGo - Subscriptions</title>
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/subscriptions.css" />
  </head>
  <body>
    <app-header back></app-header>
    <main class="content">
      <h1 class="page-title" id="page-title">Subscriptions</h1>
      <ul class="subscription-list" id="subscription-list"></ul>
      <button class="add-route-btn" id="add-route-btn">
        <span>+ Add route</span>
        <span class="add-route-divider">|</span>
        <span id="route-count"></span>
      </button>
    </main>

    <div class="sheet-overlay" id="sheet-overlay"></div>
    <div class="bottom-sheet" id="bottom-sheet">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Add a route</h2>
      <div class="sheet-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="route-search-input" placeholder="Search routes..." autocomplete="off" />
      </div>
      <ul class="sheet-results" id="sheet-results"></ul>
    </div>

    <script type="module" src="../scripts/subscriptions.ts"></script>
  </body>
</html>
