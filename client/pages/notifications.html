<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScottyGo - Notifications</title>
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/notifications.css" />
  </head>
  <body>
    <app-header back></app-header>
    <main class="content">
      <h1 class="page-title" id="page-title">Live Notifications</h1>
      <div class="notif-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="notif-search-input" placeholder="Search bus number or route..." autocomplete="off" />
        <button class="notif-search-clear" id="notif-search-clear" aria-label="Clear search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <ul class="notif-list" id="notif-list"></ul>
      <p class="notif-empty" id="notif-empty">No notifications found.</p>
    </main>
    <script type="module" src="../scripts/notification.ts"></script>
  </body>
</html>
